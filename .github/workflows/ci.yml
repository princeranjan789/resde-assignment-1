name: Clinical Dashboard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install client dependencies
        run: npm ci
        working-directory: client
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Build frontend
        run: npm run build
        working-directory: client
      - name: Run frontend lint
        run: npm run lint
        working-directory: client
      - name: Run server placeholder tests
        run: npm test
        working-directory: server

  liveness-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Verify frontend build artifact
        run: |
          cd client
          if [ ! -d .next ]; then
            echo "Build output not found"
            exit 1
          fi
          echo "Liveness check passed - build artifact exists"

  deploy:
    runs-on: ubuntu-latest
    needs: liveness-check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Build and push backend Docker image
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend server

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars MONGODB_URI=${{ secrets.MONGODB_URI }}

      - name: Build and push frontend Docker image
        run: |
          BACKEND_URL=$(gcloud run services describe backend --platform managed --region us-central1 --format='value(status.url)')
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend client --build-arg NEXT_PUBLIC_API_BASE=$BACKEND_URL

      - name: Deploy frontend to Cloud Run
        run: |
          BACKEND_URL=$(gcloud run services.describe backend --platform managed --region us-central1 --format='value(status.url)')
          gcloud run deploy frontend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars NEXT_PUBLIC_API_BASE=$BACKEND_URL
