name: Clinical Dashboard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install client dependencies
        run: npm ci
        working-directory: client
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Build frontend
        run: npm run build
        working-directory: client
      - name: Run frontend lint
        run: npm run lint
        working-directory: client
      - name: Run server placeholder tests
        run: npm test
        working-directory: server

  liveness-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Verify frontend build artifact
        run: |
          cd client
          if [ ! -d .next ]; then
            echo "Build output not found"
            exit 1
          fi
          echo "Liveness check passed - build artifact exists"
